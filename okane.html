<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不平等割り勘計算機</title>
    <link rel="stylesheet" href="kanjyo.css">
</head>
<body>

    <div class="app-container">
        
        <div id="input-view" class="view active">
            <header>
                <h1>💸 不平等割り勘</h1>
                <button id="reset-all-btn" class="btn btn-reset">🔄 全リセット</button>
            </header>

            <div class="card total-card">
                <label for="total-amount">総額 (円)</label>
                <input type="number" id="total-amount" placeholder="金額を入力" value="10005">
            </div>

            <div class="card custom-item-card">
                <h3>🎨 新しい割り勘理由を作る</h3>
                <div class="custom-input-group">
                    <input type="text" id="new-opt-label" placeholder="例：車を出してくれた">
                    <div class="percent-input-wrap">
                        <input type="number" id="new-opt-val" value="-20">
                        <span>%</span>
                    </div>
                    <button id="add-custom-opt-btn" class="btn btn-primary">追加</button>
                </div>
            </div>

            <div class="section-header">
                <h2>メンバーの設定と状況選択</h2>
                <button id="add-member-btn" class="btn btn-primary">+ メンバー追加</button>
            </div>

            <div id="members-container"></div>

            <div class="action-area">
                <button id="go-to-result-btn" class="btn btn-submit">結果を計算する 🚀</button>
            </div>
        </div>

        <div id="result-view" class="view">
            <header>
                <h1>📊 計算結果</h1>
            </header>

            <div class="card result-card">
                <div class="result-total-display">
                    <span>精算総額</span>
                    <strong id="result-total-money">0 円</strong>
                </div>
                <div id="results-list"></div>
            </div>

            <div class="action-area">
                <button id="back-to-input-btn" class="btn btn-secondary">← 入力画面に戻る</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
